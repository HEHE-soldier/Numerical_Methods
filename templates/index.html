<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Numerical Methods - Jacobi Iteration</title>
        <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
        <style>
            body{ font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; line-height: 1.6;}
            .section{ margin-bottom: 40px;}
            .form-group{margin-bottom: 15px;}
            textarea, input{width: 100%; padding: 8px; box-sizing: border-box;}
            button{padding: 10px 20px; background-color: white; color: white; border: none; cursor: pointer;}
            .result{margin-top: 20px; padding: 15px; background-color: white;border-radius: 5px;}
        </style>
    </head>
    <body>
        <div class="section">
            <h2>Interactive Calculator</h2>
            <div class="form-group">
                <label>System of Equations (One per line):</label>
                <textarea id="equations" rows="4">
                    4x_1 + x_2 = 5
                    x_1 + 3x_2 = 4
                </textarea>
            </div>
            <div class="form-group">
                <label>
                    Tolerance:
                </label>
                <input type="number" id="tolerance" value="0.0001" step="0.0001">
            </div>
            <div class="form-group">
                <label>Max Iterations:</label>
                <input type="number" id="maxIter" value="50">
            </div>
            <button onclick="calculateJacobi()">Calculate</button>

            <div id="resultBox" class="result" style="display:none;">
                <h3>
                    Results
                </h3>
                <p id="solutionText"></p>
                <p id="iterationText"></p>
            </div>
        </div>
        <script>
            async function calculateJacobi() {
                const equations = document.getElementById('equations').value;
                const tol = parseFloat(document.getElementById('tolerance').value);
                const max_iter = parseInt(document.getElementById('maxIter').value);

                const response = await fetch('/api/jacobi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ equations, tol, max_iter })
                });

                const data = await response.json();
                const resultBox = document.getElementById('resultBox');
                
                if (response.ok) {
                    const solutionStr = data.solution.map((val, index) => `x_${index + 1} = ${val.toFixed(4)}`).join(", ");
                    document.getElementById('solutionText').innerText = "Solution: " + solutionStr;
                    document.getElementById('iterationText').innerText = "Converged in " + data.iterations + " iterations.";
                    resultBox.style.display = 'block';
                } else {
                    alert("Error: " + data.error);
                }
            }
        </script>
    </body>
</html>
